<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術メモ一覧</title>
    <!-- Markdownパーサーのmarked.jsをCDNから読み込む -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        #sidebar {
            width: 250px;
            background-color: #f4f4f4;
            padding: 20px;
            box-sizing: border-box;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }
        #sidebar h2 {
            margin-top: 0;
            font-size: 1.2em;
        }
        #sidebar ul {
            list-style-type: none;
            padding: 0;
        }
        #sidebar li {
            margin-bottom: 10px;
        }
        #sidebar a {
            text-decoration: none;
            color: #333;
            cursor: pointer;
        }
        #sidebar a:hover {
            text-decoration: underline;
            color: #0066cc;
        }
        #content {
            flex-grow: 1;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        /* Markdown内で生成される要素の簡単なスタイリング */
        #content h1, #content h2, #content h3 {
            border-bottom: 1px solid #eee;
            padding-bottom: 0.3em;
        }
        #content pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
        }
        #content code {
            font-family: monospace;
            background-color: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>技術メモ</h2>
        <ul id="memo-list">
            <!-- JavaScriptでここにリストを生成します -->
        </ul>
    </div>

    <div id="content">
        <h1>左側のメニューから技術メモを選択してください</h1>
    </div>

    <!-- メインのJavaScriptファイルを読み込む -->
    <script src="js/app.js"></script>
</body>
</html>
